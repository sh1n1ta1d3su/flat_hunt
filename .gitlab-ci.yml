image: python:3.11-slim

variables:
  DOCKER_BUILDKIT: 1
  DOCKER_TLS_CERTDIR: "/certs"
  
stages:
  - lint
  - test
  - build
  - deploy

before_script:
  - pip install --upgrade pip
  - pip install -r requirements.txt
  - pip install -r requirements-dev.txt

lint_code:
  stage: lint
  script:
    - flake8 . --exit-zero

test_code:
  stage: test
  script:
    - pytest --exit-zero

build_images:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script: []
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE/parser:latest -f Dockerfile .
    - docker push $CI_REGISTRY_IMAGE/parser:latest

deploy-to-vps:
  stage: deploy
  tags:
    - vps-deploy
  before_script: []
  script:
    - echo "Начинаем деплой"
    - cp $PROD_ENV .env
    - docker compose --project-name flat_hunter down
    - docker compose --project-name flat_hunter up -d --build
    - docker image prune -f
    - echo "Деплой успешно завершен!"