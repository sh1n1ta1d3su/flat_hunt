services:
  db:
    image: postgres:15-alpine
    container_name: flathunter_db
    restart: always
    environment:
      POSTGRES_USER: hunter
      POSTGRES_PASSWORD: hunter_password
      POSTGRES_DB: flathunter
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: flathunter_redis
    restart: always
    ports:
      - "6379:6379"

  celery_worker:
    build: .
    container_name: flathunt_worker
    restart: always
    command: celery -A celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  celery_beat:
    build: .
    container_name: flathunter_beat
    restart: always
    command: celery -A celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  bot:
    build: .
    container_name: flathunter_bot
    restart: always
    command: python bot/bot.py
    env_file:
      - .env
    environment:
      - DB_HOST=db
    depends_on:
      - db
volumes:
  pgdata: